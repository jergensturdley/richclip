<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="34" y="36" width="60" height="70" rx="8" fill="none" stroke="#fff" stroke-width="5"/>

  <!-- Clipboard clip (metal tab) -->
  <rect x="48" y="26" width="32" height="16" rx="6" fill="#fff"/>
  <circle cx="64" cy="34" r="3" fill="url(#bg)"/>

  <!-- Text lines on clipboard paper -->
  <line x1="46" y1="56" x2="82" y2="56" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="46" y1="68" x2="82" y2="68" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="46" y1="80" x2="70" y2="80" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Sparkle accent (top-right) -->
  <path d="M100 20 L102 28 L110 30 L102 32 L100 40 L98 32 L90 30 L98 28 Z" fill="url(#sparkle)" opacity="0.95"/>

  <!-- Small sparkle (bottom-left) -->
  <path d="M24 90 L25 94 L29 95 L25 96 L24 100 L23 96 L19 95 L23 94 Z" fill="url(#sparkle)" opacity="0.6"/>
</svg>
